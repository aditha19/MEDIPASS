<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediPass - Doctor Emergency View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #0a0a0a; padding: 16px; color: #fff; }
        .header { background: linear-gradient(135deg, #dc3545, #8b0000); color: white; padding: 20px; border-radius: 16px; text-align: center; margin-bottom: 16px; border: 1px solid rgba(255,100,100,.3); }
        .header h1 { font-size: 20px; margin-bottom: 4px; letter-spacing: .05em; }
        .header p { font-size: 12px; opacity: 0.85; }
        .identity-card { background: #111; border: 1px solid #333; border-radius: 16px; padding: 20px; margin-bottom: 14px; display: flex; align-items: center; gap: 16px; }
        .patient-photo { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #00ffe7; flex-shrink: 0; background: #222; display: flex; align-items: center; justify-content: center; font-size: 32px; overflow: hidden; }
        .patient-photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .patient-info { flex: 1; }
        .patient-name { font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 4px; }
        .patient-age { color: #aaa; font-size: 14px; margin-bottom: 8px; }
        .verify-badge { display: inline-block; background: rgba(0,255,100,.1); border: 1px solid rgba(0,255,100,.3); border-radius: 99px; padding: 4px 12px; font-size: 11px; color: #00ff64; }
        .blood-group { background: linear-gradient(135deg, #dc3545, #8b0000); color: white; text-align: center; padding: 20px; border-radius: 16px; margin-bottom: 14px; }
        .blood-group h2 { font-size: 56px; font-weight: bold; line-height: 1; }
        .blood-group p { font-size: 13px; opacity: 0.9; margin-top: 4px; }
        .allergy-card { background: #1a1500; border: 2px solid #ffc107; padding: 20px; border-radius: 16px; margin-bottom: 14px; }
        .allergy-card h3 { color: #ffc107; margin-bottom: 8px; font-size: 15px; }
        .allergy-card p { color: #ffe066; font-size: 15px; font-weight: bold; }
        .card { background: #111; border: 1px solid #333; padding: 18px; border-radius: 16px; margin-bottom: 14px; }
        .card h3 { color: #aaa; margin-bottom: 8px; font-size: 13px; text-transform: uppercase; letter-spacing: .1em; }
        .card p { color: #eee; font-size: 15px; line-height: 1.5; }
        .emergency-card { background: #0a1628; border: 2px solid #1a73e8; padding: 18px; border-radius: 16px; margin-bottom: 14px; }
        .emergency-card h3 { color: #1a73e8; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; letter-spacing: .1em; }
        .contact-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.06); }
        .contact-row:last-child { border-bottom: none; padding-bottom: 0; }
        .contact-name { font-weight: bold; color: #fff; font-size: 15px; }
        .contact-label { font-size: 11px; color: #666; margin-top: 2px; }
        .call-btn { background: #1a73e8; color: white; padding: 10px 16px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 13px; white-space: nowrap; }
        .whatsapp-section { margin-bottom: 14px; display: flex; flex-direction: column; gap: 10px; }
        .wa-btn-both { display: flex; align-items: center; justify-content: center; gap: 10px; background: linear-gradient(135deg, #1a8f4a, #0f7066); color: white; padding: 18px 16px; border-radius: 14px; font-weight: bold; font-size: 15px; cursor: pointer; border: none; width: 100%; box-shadow: 0 4px 24px rgba(37,211,102,.3); }
        .wa-row { display: flex; gap: 10px; }
        .wa-btn-single { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; padding: 14px 10px; border-radius: 12px; font-weight: bold; font-size: 13px; cursor: pointer; border: none; }
        .wa-btn-1 { background: #25D366; }
        .wa-btn-2 { background: #128C7E; }
        .loc-status { border-radius: 10px; padding: 10px 14px; font-size: 12px; display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .loc-fetching { background: #111; border: 1px solid #333; color: #aaa; }
        .loc-ok { background: #0d1f0d; border: 1px solid #1a4d1a; color: #6fcf6f; }
        .loc-err { background: #1a0d0d; border: 1px solid #4d1a1a; color: #ff7a7a; }
        .ai-card { background: #120a28; border: 2px solid #7c3aed; padding: 20px; border-radius: 16px; margin-bottom: 14px; }
        .ai-card h3 { color: #a78bff; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; letter-spacing: .1em; }
        .ai-card p { color: #d4bbff; font-size: 14px; line-height: 1.7; }
        .risk-badge { display: inline-block; padding: 6px 14px; border-radius: 20px; font-weight: bold; font-size: 13px; margin-bottom: 10px; }
        .risk-critical { background: #dc3545; color: white; }
        .risk-high { background: #fd7e14; color: white; }
        .risk-medium { background: #ffc107; color: black; }
        .risk-low { background: #28a745; color: white; }
        .voice-btn { display: block; background: #7c3aed; color: white; text-align: center; padding: 12px; border-radius: 10px; border: none; font-weight: bold; font-size: 14px; margin-top: 12px; width: 100%; cursor: pointer; }
        .voice-btn:disabled { background: #444; cursor: not-allowed; }
        .loading { color: #666; font-style: italic; }
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .mode-badge { text-align: center; padding: 10px; border-radius: 10px; font-weight: bold; margin-bottom: 14px; font-size: 14px; }
        .mode-emergency { background: #dc3545; color: white; }
        .mode-normal { background: #1a73e8; color: white; }
        .emergency-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .popup-box { background: #111; border: 2px solid #dc3545; padding: 30px; border-radius: 20px; text-align: center; max-width: 320px; width: 90%; }
        .popup-box h2 { color: #dc3545; font-size: 22px; margin-bottom: 10px; }
        .popup-box p { color: #aaa; margin-bottom: 20px; font-size: 14px; line-height: 1.5; }
        .btn-emergency { display: block; background: #dc3545; color: white; padding: 15px; border-radius: 10px; border: none; font-size: 16px; font-weight: bold; width: 100%; margin-bottom: 10px; cursor: pointer; }
        .btn-normal { display: block; background: #1a73e8; color: white; padding: 15px; border-radius: 10px; border: none; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; }
        .donor-card { background: #0a1a0a; border: 2px solid #28a745; padding: 20px; border-radius: 16px; margin-bottom: 14px; }
        .donor-card h3 { color: #28a745; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; letter-spacing: .1em; }
        .donor-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.06); }
        .donor-row:last-child { border-bottom: none; }
        .donor-name { color: #fff; font-weight: bold; font-size: 14px; }
        .donor-dist { color: #aaa; font-size: 12px; }
        .donor-btn { background: #28a745; color: white; padding: 8px 12px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 12px; }
        .find-donor-btn { display: block; background: #28a745; color: white; text-align: center; padding: 14px; border-radius: 12px; border: none; font-weight: bold; font-size: 15px; width: 100%; cursor: pointer; margin-bottom: 14px; }
    </style>
</head>
<body>

    <div class="emergency-popup" id="emergencyPopup">
        <div class="popup-box">
            <h2>🚨 Is This an Emergency?</h2>
            <p>Select the type of scan. Emergency mode will activate voice reader, request location, and enable WhatsApp alerts.</p>
            <button class="btn-emergency" onclick="setMode('emergency')">🚨 YES — This is an Emergency</button>
            <button class="btn-normal" onclick="setMode('normal')">📋 No — Routine Checkup</button>
        </div>
    </div>

    <div class="header">
        <h1>🚨 EMERGENCY MEDICAL ID</h1>
        <p>MediPass — Smart Medical Passport</p>
    </div>

    <div id="modeBadge"></div>
    <div id="whatsappContainer"></div>
    <div id="patientInfo">
        <p style="text-align:center;color:#666;padding:40px;">Loading patient data...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQzrcG7R06X-pU9TwZX37Yeb76zVBIM4U",
            authDomain: "medipass-e4f7d.firebaseapp.com",
            projectId: "medipass-e4f7d",
            storageBucket: "medipass-e4f7d.firebasestorage.app",
            messagingSenderId: "911340948509",
            appId: "1:911340948509:web:e8d0ca16801a34fddb4af4"
        };

        const GEMINI_API_KEY = "AIzaSyAjuztgKHSRCe1FY2eTwAH9amH6E1jkCfY";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const patientId = urlParams.get('id');

        let locationData = null;
        let patientData = null;
        let aiTextGlobal = '';

        if (patientId) {
            const docRef = doc(db, "patients", patientId);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                patientData = docSnap.data();
                await updateDoc(docRef, { scanned: true, scannedAt: new Date() });
            } else {
                document.getElementById('patientInfo').innerHTML = '<p style="text-align:center;color:red;padding:40px;">Patient not found.</p>';
                document.getElementById('emergencyPopup').style.display = 'none';
            }
        }

        function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) { resolve(null); return; }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const lat = pos.coords.latitude.toFixed(6);
                        const lng = pos.coords.longitude.toFixed(6);
                        resolve({ lat, lng, mapsUrl: `https://maps.google.com/?q=${lat},${lng}` });
                    },
                    () => resolve(null),
                    { timeout: 8000, enableHighAccuracy: true }
                );
            });
        }

        function buildMessage(p, contactName) {
            const time = new Date().toLocaleTimeString('en-IN');
            const locLine = locationData ? `\n📍 *Location:* ${locationData.mapsUrl}` : '';
            return (
                `🚨 *EMERGENCY ALERT*\n` +
                `*${p.name}*'s MediPass QR was just scanned by a doctor.\n` +
                `Please contact them immediately or call *108*.\n` +
                locLine +
                `\n🕐 *Time:* ${time}`
            );
        }

        function openWA(phone, msg) {
            window.open(`https://api.whatsapp.com/send?phone=91${phone}&text=${encodeURIComponent(msg)}`, '_blank');
        }

        // Calculate distance between two GPS points in km
        function getDistanceKm(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
                Math.sin(dLng/2) * Math.sin(dLng/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        window.findDonors = async function() {
            const p = patientData;
            document.getElementById('donorResults').innerHTML = '<p style="color:#aaa;font-size:13px;">🔍 Searching nearby donors...</p>';

            if (!locationData) {
                document.getElementById('donorResults').innerHTML = '<p style="color:#ff7a7a;font-size:13px;">⚠️ Location needed to find nearby donors. Please allow location access.</p>';
                return;
            }

            try {
                const snapshot = await getDocs(collection(db, "patients"));
                const donors = [];

                snapshot.forEach(d => {
                    const data = d.data();
                    if (
                        d.id !== patientId &&
                        data.isDonor === true &&
                        data.bloodGroup === p.bloodGroup &&
                        data.lat && data.lng
                    ) {
                        const dist = getDistanceKm(
                            parseFloat(locationData.lat), parseFloat(locationData.lng),
                            parseFloat(data.lat), parseFloat(data.lng)
                        );
                        if (dist <= 10) {
                            donors.push({ name: data.name, phone: data.emergencyPhone, dist: dist.toFixed(1) });
                        }
                    }
                });

                donors.sort((a, b) => a.dist - b.dist);

                if (donors.length === 0) {
                    document.getElementById('donorResults').innerHTML = `<p style="color:#aaa;font-size:13px;">No ${p.bloodGroup} donors found within 10km right now.</p>`;
                } else {
                    document.getElementById('donorResults').innerHTML = donors.map(d => `
                        <div class="donor-row">
                            <div>
                                <div class="donor-name">${d.name}</div>
                                <div class="donor-dist">📍 ${d.dist} km away • ${p.bloodGroup}</div>
                            </div>
                            <a href="tel:${d.phone}" class="donor-btn">📞 Call</a>
                        </div>
                    `).join('');
                }
            } catch(e) {
                document.getElementById('donorResults').innerHTML = '<p style="color:#ff7a7a;font-size:13px;">Error searching donors.</p>';
            }
        }

        window.setMode = async function(mode) {
            document.getElementById('emergencyPopup').style.display = 'none';
            const p = patientData;
            if (!p) return;

            // Speak immediately when emergency button tapped
            if (mode === 'emergency') {
                const immediateText = `Emergency alert. Patient name ${p.name}. Age ${p.age}. Blood group ${p.bloodGroup}. ${p.allergies ? 'Known allergies: ' + p.allergies + '. Do not administer these.' : 'No known allergies.'} Please act immediately.`;
                const immediateSpeak = new SpeechSynthesisUtterance(immediateText);
                immediateSpeak.lang = 'en-IN';
                immediateSpeak.rate = 0.85;
                immediateSpeak.pitch = 1;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(immediateSpeak);
            }

            const has2 = !!(p.emergencyName2 && p.emergencyPhone2);

            document.getElementById('modeBadge').innerHTML = mode === 'emergency'
                ? '<div class="mode-badge mode-emergency">🚨 EMERGENCY MODE ACTIVE</div>'
                : '<div class="mode-badge mode-normal">📋 ROUTINE CHECKUP MODE</div>';

            if (mode === 'emergency') {
                const name1Short = p.emergencyName.split(' ')[0];
                const name2Short = has2 ? p.emergencyName2.split(' ')[0] : '';

                document.getElementById('whatsappContainer').innerHTML = `
                    <div class="whatsapp-section">
                        <div id="locStatus" class="loc-status loc-fetching">⏳ Requesting location access...</div>
                        <button class="wa-btn-both" onclick="sendWA('both')">
                            📲 Send Emergency Alert to ${has2 ? 'BOTH Contacts' : name1Short} 📍
                        </button>
                        ${has2 ? `
                        <div class="wa-row">
                            <button class="wa-btn-single wa-btn-1" onclick="sendWA(1)">📱 Alert ${name1Short}</button>
                            <button class="wa-btn-single wa-btn-2" onclick="sendWA(2)">📱 Alert ${name2Short}</button>
                        </div>` : ''}
                    </div>
                `;

                locationData = await getLocation();
                const locEl = document.getElementById('locStatus');
                if (locationData) {
                    locEl.className = 'loc-status loc-ok';
                    locEl.innerHTML = `✅ Location captured — will be included in alert`;
                } else {
                    locEl.className = 'loc-status loc-err';
                    locEl.innerHTML = `⚠️ Location denied — alert will be sent without location`;
                }

                window.sendWA = function(target) {
                    if (target === 1 || target === 'both') {
                        openWA(p.emergencyPhone, buildMessage(p, p.emergencyName));
                    }
                    if ((target === 2 || target === 'both') && has2) {
                        setTimeout(() => openWA(p.emergencyPhone2, buildMessage(p, p.emergencyName2)), 900);
                    }
                };
            }

            const photoHtml = p.photo
                ? `<div class="patient-photo"><img src="${p.photo}" alt="${p.name}"/></div>`
                : `<div class="patient-photo">👤</div>`;

            const contact2Html = has2 ? `
                <div class="contact-row">
                    <div>
                        <div class="contact-name">${p.emergencyName2}</div>
                        <div class="contact-label">Emergency Contact 2</div>
                    </div>
                    <a href="tel:${p.emergencyPhone2}" class="call-btn">📞 Call</a>
                </div>` : '';

            document.getElementById('patientInfo').innerHTML = `
                <div class="identity-card">
                    ${photoHtml}
                    <div class="patient-info">
                        <div class="patient-name">${p.name}</div>
                        <div class="patient-age">Age: ${p.age}</div>
                        <div class="verify-badge">✓ Verify face matches photo</div>
                    </div>
                </div>

                <div class="blood-group">
                    <h2>${p.bloodGroup}</h2>
                    <p>Blood Group</p>
                </div>

                <div class="allergy-card">
                    <h3>⚠️ ALLERGIES — DO NOT ADMINISTER</h3>
                    <p>${p.allergies || 'None reported'}</p>
                </div>

                <div class="ai-card">
                    <h3>🤖 AI Emergency Brief</h3>
                    <div id="riskBadge"></div>
                    <p id="aiSummary" class="loading pulse">⏳ Generating clinical summary...</p>
                    <button class="voice-btn" id="voiceBtn" onclick="speakSummary()" ${mode === 'emergency' ? 'disabled' : 'style="display:none"'}>🔊 Read Aloud (Loading...)</button>
                </div>

                <div class="card">
                    <h3>💊 Current Medications</h3>
                    <p>${p.medications || 'None reported'}</p>
                </div>

                <div class="card">
                    <h3>🏥 Chronic Conditions</h3>
                    <p>${p.diseases || 'None reported'}</p>
                </div>

                ${mode === 'emergency' ? `
                <div class="donor-card">
                    <h3>🩸 Find Nearby Blood Donors (${p.bloodGroup})</h3>
                    <button class="find-donor-btn" onclick="findDonors()">🔍 Search ${p.bloodGroup} Donors Within 10km</button>
                    <div id="donorResults"></div>
                </div>` : ''}

                <div class="emergency-card">
                    <h3>📞 Emergency Contacts</h3>
                    <div class="contact-row">
                        <div>
                            <div class="contact-name">${p.emergencyName}</div>
                            <div class="contact-label">Primary Contact</div>
                        </div>
                        <a href="tel:${p.emergencyPhone}" class="call-btn">📞 Call</a>
                    </div>
                    ${contact2Html}
                </div>
                <p style="text-align:center;color:#333;font-size:11px;margin-top:16px;">Patient ID: ${patientId}</p>
            `;

            await generateAI(p, mode);
        }

        async function generateAI(p, mode) {
            try {
                const prompt = `You are an emergency medical AI. Patient:
- Name: ${p.name}, Age: ${p.age}, Blood Group: ${p.bloodGroup}
- Allergies: ${p.allergies || 'None'}
- Chronic Diseases: ${p.diseases || 'None'}
- Current Medications: ${p.medications || 'None'}

Give a SHORT emergency brief:
1. RISK LEVEL: Critical, High, Medium, or Low
2. DO NOT GIVE: What medications or treatments to avoid
3. FIRST ACTION: What to check immediately
4. WARNING: Dangerous drug interactions if any

Be very direct. Doctor reads this in 10 seconds.`;

                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    }
                );

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                aiTextGlobal = aiText;

                let riskLevel = 'MEDIUM';
                let riskClass = 'risk-medium';
                if (aiText.toLowerCase().includes('critical')) { riskLevel = 'CRITICAL'; riskClass = 'risk-critical'; }
                else if (aiText.toLowerCase().includes('high')) { riskLevel = 'HIGH'; riskClass = 'risk-high'; }
                else if (aiText.toLowerCase().includes('low')) { riskLevel = 'LOW'; riskClass = 'risk-low'; }

                document.getElementById('riskBadge').innerHTML = `<span class="risk-badge ${riskClass}">⚠️ Risk: ${riskLevel}</span>`;
                document.getElementById('aiSummary').innerText = aiText;
                document.getElementById('aiSummary').classList.remove('loading', 'pulse');

                if (mode === 'emergency') {
                    const voiceBtn = document.getElementById('voiceBtn');
                    if (voiceBtn) {
                        voiceBtn.disabled = false;
                        voiceBtn.innerText = '🔊 Read Full AI Summary';
                    }
                }

            } catch (error) {
                document.getElementById('aiSummary').innerText = 'AI summary unavailable. Check patient details manually.';
                document.getElementById('aiSummary').classList.remove('pulse');
            }
        }

        window.speakSummary = function() {
            const p = patientData;
            const text = `Emergency patient ${p.name}. Age ${p.age}. Blood group ${p.bloodGroup}. ${p.allergies ? 'Known allergies: ' + p.allergies + '. ' : 'No known allergies. '} ${aiTextGlobal}`;
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'en-IN';
            speech.rate = 0.85;
            speech.pitch = 1;
            window.speechSynthesis.speak(speech);
        }

    </script>
</body>
</html>

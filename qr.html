<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediPass - Your QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f0f4ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        h1 {
            color: #28a745;
            margin-bottom: 10px;
            font-size: 28px;
        }
        p.subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            padding: 20px;
            border: 4px solid #28a745;
            border-radius: 15px;
            display: inline-block;
        }
        .patient-id {
            background: #f0f4ff;
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            color: #666;
            margin-bottom: 20px;
            word-break: break-all;
        }
        .instruction {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            font-size: 13px;
            color: #856404;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #218838;
        }
        .btn-secondary {
            background-color: #1a73e8;
        }
        .btn-secondary:hover {
            background-color: #1557b0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Your MediPass is Ready!</h1>
        <p class="subtitle">Show this QR code in any emergency</p>

        <div id="qrcode"></div>

        <div class="patient-id">
            <strong>Your Medical ID:</strong><br>
            <span id="patientIdText"></span>
        </div>

        <div class="instruction">
            📋 Save this QR code on your phone or print it as a card. Any doctor can scan it in an emergency to see your complete medical information instantly.
        </div>

        <button onclick="downloadQR()">⬇️ Download QR Code</button>
        <button class="btn-secondary" onclick="window.location.href='index.html'">Register Another Person</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const patientId = urlParams.get('id');

        if (patientId) {
            document.getElementById('patientIdText').innerText = patientId;

       const doctorUrl = 'https://medipass-tau.vercel.app/doctor.html?id=' + patientId;

            new QRCode(document.getElementById('qrcode'), {
                text: doctorUrl,
                width: 200,
                height: 200,
                colorDark: "#000000",
                colorLight: "#ffffff",
            });
        } else {
            document.getElementById('patientIdText').innerText = 'No patient ID found';
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = 'medipass-qr.png';
                link.href = canvas.toDataURL();
                link.click();
            } else {
                alert('QR code not ready yet. Please wait a moment and try again.');
            }
        }
    </script>
</body>
</html>

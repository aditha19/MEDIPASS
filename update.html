<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediPass - Update Details</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&family=Orbitron:wght@700;900&family=DM+Sans&display=swap" rel="stylesheet">
<style>
:root{--c:#00ffe7;--v:#7b2fff;--r:#ff2d6e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020510;color:#cce8ff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;overflow-x:hidden}
#bg{position:fixed;inset:0;z-index:0}
.noise{position:fixed;inset:-50%;width:200%;height:200%;z-index:2;pointer-events:none;opacity:.028;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:ns .5s steps(2) infinite}
@keyframes ns{25%{transform:translate(-2%,1%)}50%{transform:translate(1%,-2%)}75%{transform:translate(-1%,2%)}}
.scan{position:fixed;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,transparent,rgba(0,255,231,.15),transparent);z-index:3;pointer-events:none;animation:sd 8s linear infinite}
@keyframes sd{0%{top:-4px;opacity:.6}50%{opacity:.2}100%{top:100vh;opacity:0}}
.wrap{position:relative;z-index:10;width:100%;max-width:560px;padding:40px 16px 64px}
.hdr{text-align:center;margin-bottom:32px;animation:hi 1s cubic-bezier(.22,1,.36,1) both}
@keyframes hi{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
.logo-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:8px}
.emblem{width:56px;height:56px}
.spin{animation:sp 12s linear infinite;transform-origin:28px 28px}
@keyframes sp{to{transform:rotate(360deg)}}
h1{font-family:'Orbitron',monospace;font-size:38px;font-weight:900;letter-spacing:.06em;background:linear-gradient(135deg,#fff,var(--c) 45%,var(--v));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(0,255,231,.25))}
.tag{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:rgba(140,200,255,.38);font-family:'Rajdhani',sans-serif;display:block;text-align:center}
.card{background:rgba(4,12,35,.78);backdrop-filter:blur(32px) saturate(160%);border-radius:28px;border:1px solid rgba(0,255,231,.18);padding:40px 36px;position:relative;overflow:hidden;box-shadow:0 0 0 1px rgba(0,255,231,.06),0 40px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.06);animation:ci .9s .15s cubic-bezier(.22,1,.36,1) both}
@keyframes ci{from{opacity:0;transform:translateY(40px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.card::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(0,255,231,.04) 0%,transparent 30%,rgba(123,47,255,.04) 60%,transparent 80%);pointer-events:none}
.card::after{content:'';position:absolute;top:18px;left:18px;width:28px;height:28px;border-top:2px solid var(--c);border-left:2px solid var(--c);border-radius:4px 0 0 0;opacity:.6}
.br{position:absolute;bottom:18px;right:18px;width:28px;height:28px;border-bottom:2px solid var(--c);border-right:2px solid var(--c);border-radius:0 0 4px 0;opacity:.6}
.sec{display:flex;align-items:center;gap:10px;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:.25em;color:var(--c);text-transform:uppercase;margin:24px 0 16px;opacity:.75}
.sec::before{content:'';width:18px;height:1px;background:var(--c);opacity:.5}
.sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,255,231,.25),transparent)}
.sec:first-of-type{margin-top:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.s2{grid-column:1/-1}
.stack{display:flex;flex-direction:column;gap:12px}
.f label{display:block;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,255,231,.55);margin-bottom:7px;transition:color .2s}
.f:focus-within label{color:var(--c)}
.iw{position:relative}
input,select,textarea{width:100%;background:rgba(0,20,60,.45);border:1px solid rgba(0,255,231,.14);border-radius:12px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:#e0f4ff;outline:none;transition:border-color .25s,background .25s,box-shadow .25s}
textarea{height:76px;resize:none}
input::placeholder,textarea::placeholder{color:rgba(140,200,255,.22)}
select{cursor:pointer}
select option{background:#050e28;color:#cce8ff}
input:focus,select:focus,textarea:focus{border-color:rgba(0,255,231,.55);background:rgba(0,255,231,.04);box-shadow:0 0 0 3px rgba(0,255,231,.08)}
.iw::after{content:'';position:absolute;bottom:0;left:50%;width:0;height:2px;background:linear-gradient(90deg,var(--v),var(--c));border-radius:0 0 12px 12px;transition:width .3s,left .3s;z-index:2}
.f:focus-within .iw::after{width:100%;left:0}
.bw{margin-top:28px;position:relative}
.bglow{position:absolute;inset:-2px;border-radius:16px;background:linear-gradient(135deg,var(--c),var(--v),var(--r));filter:blur(8px);opacity:0;transition:opacity .3s}
button{position:relative;z-index:1;width:100%;padding:17px 24px;background:linear-gradient(135deg,#003a5c,#010c28);border:1px solid rgba(0,255,231,.35);border-radius:14px;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--c);cursor:pointer;transition:transform .2s,color .2s;display:flex;align-items:center;justify-content:center;gap:10px}
button::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,255,231,.1),transparent,rgba(123,47,255,.1));opacity:0;transition:opacity .3s}
.bw:hover .bglow{opacity:.55}
.bw:hover button{transform:translateY(-2px);color:#fff}
.bw:hover button::before{opacity:1}
.bw:active button{transform:translateY(0)}
.bi{animation:rot 4s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.status{text-align:center;margin-top:16px;font-family:'Rajdhani',sans-serif;font-size:14px;letter-spacing:.1em;color:var(--c);min-height:20px}
.back{display:block;text-align:center;margin-bottom:20px;color:rgba(0,255,231,.45);font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:.15em;text-decoration:none;text-transform:uppercase}
.back:hover{color:var(--c)}
.id-box{background:rgba(0,255,231,.04);border:1px solid rgba(0,255,231,.2);border-radius:16px;padding:20px;margin-bottom:24px}
.id-box p{font-size:12px;color:rgba(140,200,255,.5);margin-bottom:10px;font-family:'Rajdhani',sans-serif;letter-spacing:.1em}
.id-row{display:flex;gap:10px}
.id-row input{flex:1}
.id-row button{width:auto;padding:12px 20px;font-size:11px}
.form-section{display:none}
.form-section.visible{display:block}
.photo-upload{display:flex;align-items:center;gap:16px}
.photo-preview{width:80px;height:80px;border-radius:50%;border:2px solid rgba(0,255,231,.3);background:rgba(0,20,60,.45);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;overflow:hidden}
.photo-preview img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.photo-btn{flex:1;background:rgba(0,20,60,.45);border:1px dashed rgba(0,255,231,.3);border-radius:12px;padding:14px;text-align:center;cursor:pointer;font-size:13px;color:rgba(140,200,255,.6);transition:border-color .2s,color .2s}
.photo-btn:hover{border-color:var(--c);color:var(--c)}
.opt-label{font-size:9px;opacity:.45;font-family:'Rajdhani',sans-serif;letter-spacing:.1em;text-transform:uppercase;margin-left:4px}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="noise"></div>
<div class="scan"></div>

<div class="wrap">
  <a href="landing.html" class="back">← Back to Home</a>
  <div class="hdr">
    <div class="logo-row">
      <div class="emblem">
        <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g class="spin"><circle cx="28" cy="28" r="26" stroke="url(#rg)" stroke-width="1.2" stroke-dasharray="4 3" opacity=".7"/></g>
          <circle cx="28" cy="28" r="18" fill="url(#ig)" opacity=".15"/>
          <circle cx="28" cy="28" r="18" stroke="url(#rg)" stroke-width="1" opacity=".5"/>
          <rect x="23" y="16" width="10" height="24" rx="2.5" fill="url(#cg)"/>
          <rect x="16" y="23" width="24" height="10" rx="2.5" fill="url(#cg)"/>
          <circle cx="28" cy="28" r="3" fill="#00ffe7" opacity=".9"/>
          <defs>
            <linearGradient id="rg" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#00ffe7"/><stop offset="100%" stop-color="#7b2fff"/></linearGradient>
            <linearGradient id="ig" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#00ffe7"/><stop offset="100%" stop-color="#0066ff"/></linearGradient>
            <linearGradient id="cg" x1="16" y1="16" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#00ffe7"/><stop offset="100%" stop-color="#0066ff"/></linearGradient>
          </defs>
        </svg>
      </div>
      <h1>MEDIPASS</h1>
    </div>
    <span class="tag">Update Your Details</span>
  </div>

  <div class="card">
    <div class="br"></div>

    <!-- Step 1: Enter Patient ID -->
    <div class="sec">Your Patient ID</div>
    <div class="id-box">
      <p>📋 Enter the Patient ID from your QR page to load your details</p>
      <div class="id-row">
        <div class="iw"><input type="text" id="patientId" placeholder="e.g. abc123xyz789" onkeydown="if(event.key==='Enter'){loadPatient()}"/></div>
        <div class="bw" style="margin:0">
          <div class="bglow"></div>
          <button onclick="loadPatient()" id="loadBtn">Load →</button>
        </div>
      </div>
    </div>
    <div class="status" id="loadStatus"></div>

    <!-- Step 2: Update Form (hidden until ID is loaded) -->
    <div class="form-section" id="formSection">

      <div class="sec">Profile Photo</div>
      <div class="photo-upload">
        <div class="photo-preview" id="photoPreview">📷</div>
        <div class="photo-btn" onclick="document.getElementById('photoInput').click()">
          📸 Update Your Photo<br>
          <span style="font-size:11px;opacity:.6;">Doctor uses this to verify patient identity</span>
        </div>
        <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="previewPhoto(this)"/>
      </div>

      <div class="sec">Identity</div>
      <div class="g2">
        <div class="f s2"><label>Full Name</label><div class="iw"><input type="text" id="name" placeholder="e.g. Arjun Sharma" oninput="this.value=this.value.replace(/[^a-zA-Z\s]/g,'')" onkeydown="if(event.key==='Enter'){document.getElementById('age').focus()}"/></div></div>
        <div class="f"><label>Age</label><div class="iw"><input type="number" id="age" placeholder="25" min="1" max="120" step="1" oninput="this.value=Math.floor(Math.abs(this.value)); if(this.value<1)this.value=1; if(this.value>120)this.value=120;" onkeydown="if(event.key==='Enter'){document.getElementById('blood').focus()}"/></div></div>
        <div class="f"><label>Blood Group</label><div class="iw"><select id="blood" onkeydown="if(event.key==='Enter'){document.getElementById('allergies').focus()}"><option value="">— Select —</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>O+</option><option>O-</option><option>AB+</option><option>AB-</option></select></div></div>
      </div>

      <div class="sec">Medical Profile</div>
      <div class="stack">
        <div class="f"><label>Allergies</label><div class="iw"><textarea id="allergies" placeholder="e.g. Penicillin, Peanuts, Latex" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();document.getElementById('diseases').focus()}"></textarea></div></div>
        <div class="f"><label>Chronic Diseases</label><div class="iw"><textarea id="diseases" placeholder="e.g. Diabetes, Hypertension, Asthma" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();document.getElementById('meds').focus()}"></textarea></div></div>
        <div class="f"><label>Current Medications</label><div class="iw"><textarea id="meds" placeholder="e.g. Metformin 500mg" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();document.getElementById('ename').focus()}"></textarea></div></div>
      </div>

      <div class="sec">Emergency Contacts</div>
      <div class="g2">
        <div class="f"><label>Contact 1 Name</label><div class="iw"><input type="text" id="ename" placeholder="Full Name" oninput="this.value=this.value.replace(/[^a-zA-Z\s]/g,'')" onkeydown="if(event.key==='Enter'){document.getElementById('ephone').focus()}"/></div></div>
        <div class="f"><label>Contact 1 Phone</label><div class="iw"><input type="tel" id="ephone" placeholder="98765 43210" maxlength="10" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)" onkeydown="if(event.key==='Enter'){document.getElementById('ename2').focus()}"/></div></div>
        <div class="f"><label>Contact 2 Name<span class="opt-label">(Optional)</span></label><div class="iw"><input type="text" id="ename2" placeholder="Full Name" oninput="this.value=this.value.replace(/[^a-zA-Z\s]/g,'')" onkeydown="if(event.key==='Enter'){document.getElementById('ephone2').focus()}"/></div></div>
        <div class="f"><label>Contact 2 Phone<span class="opt-label">(Optional)</span></label><div class="iw"><input type="tel" id="ephone2" placeholder="98765 43210" maxlength="10" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)" onkeydown="if(event.key==='Enter'){updatePatient()}"/></div></div>
      </div>

      <div class="bw">
        <div class="bglow"></div>
        <button onclick="updatePatient()" id="updateBtn"><span class="bi">⬡</span> Update MediPass</button>
      </div>
      <div class="status" id="updateStatus"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQzrcG7R06X-pU9TwZX37Yeb76zVBIM4U",
  authDomain: "medipass-e4f7d.firebaseapp.com",
  projectId: "medipass-e4f7d",
  storageBucket: "medipass-e4f7d.firebasestorage.app",
  messagingSenderId: "911340948509",
  appId: "1:911340948509:web:e8d0ca16801a34fddb4af4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.previewPhoto = function(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('photoPreview').innerHTML = `<img src="${e.target.result}" alt="Photo"/>`;
    };
    reader.readAsDataURL(input.files[0]);
  }
};

window.loadPatient = async function() {
  const id = document.getElementById('patientId').value.trim();
  if (!id) {
    document.getElementById('loadStatus').innerText = '⚠️ Please enter your Patient ID!';
    return;
  }
  document.getElementById('loadStatus').innerText = '🔍 Loading your details...';

  try {
    const docRef = doc(db, "patients", id);
    const docSnap = await getDoc(docRef);
    if (docSnap.exists()) {
      const p = docSnap.data();
      document.getElementById('name').value = p.name || '';
      document.getElementById('age').value = p.age || '';
      document.getElementById('blood').value = p.bloodGroup || '';
      document.getElementById('allergies').value = p.allergies || '';
      document.getElementById('diseases').value = p.diseases || '';
      document.getElementById('meds').value = p.medications || '';
      document.getElementById('ename').value = p.emergencyName || '';
      document.getElementById('ephone').value = p.emergencyPhone || '';
      document.getElementById('ename2').value = p.emergencyName2 || '';
      document.getElementById('ephone2').value = p.emergencyPhone2 || '';
      if (p.photo) {
        document.getElementById('photoPreview').innerHTML = `<img src="${p.photo}" alt="Photo"/>`;
      }
      document.getElementById('formSection').classList.add('visible');
      document.getElementById('loadStatus').innerText = '✅ Details loaded! Update below and save.';
    } else {
      document.getElementById('loadStatus').innerText = '❌ Patient ID not found! Please check and try again.';
    }
  } catch (error) {
    document.getElementById('loadStatus').innerText = '❌ Error loading data. Please try again.';
  }
};

window.updatePatient = async function() {
  const id = document.getElementById('patientId').value.trim();
  const name = document.getElementById('name').value.trim();
  const age = document.getElementById('age').value.trim();
  const blood = document.getElementById('blood').value;
  const ename = document.getElementById('ename').value.trim();
  const phone = document.getElementById('ephone').value.trim();
  const ename2 = document.getElementById('ename2').value.trim();
  const ephone2 = document.getElementById('ephone2').value.trim();

  if (!name) { showErr('⚠️ Please enter your Full Name!', 'name'); return; }
  if (!age) { showErr('⚠️ Please enter your Age!', 'age'); return; }
  if (!blood) { showErr('⚠️ Please select your Blood Group!', 'blood'); return; }
  if (!ename) { showErr('⚠️ Please enter Emergency Contact 1 Name!', 'ename'); return; }
  if (!phone) { showErr('⚠️ Please enter Emergency Contact 1 Phone!', 'ephone'); return; }
  if (phone.length !== 10) { showErr('⚠️ Phone must be exactly 10 digits!', 'ephone'); return; }
  if (!['6','7','8','9'].includes(phone[0])) { showErr('⚠️ Enter a valid Indian mobile number!', 'ephone'); return; }
  if (ephone2 && ephone2.length !== 10) { showErr('⚠️ Contact 2 phone must be 10 digits!', 'ephone2'); return; }

  function showErr(msg, elId) {
    document.getElementById('updateStatus').innerText = msg;
    const el = document.getElementById(elId);
    el.style.borderColor = 'rgba(255,45,110,.7)';
    el.focus();
    setTimeout(() => el.style.borderColor = '', 2000);
  }

  const btn = document.getElementById('updateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> Updating...';
  document.getElementById('updateStatus').innerText = 'Saving your updates...';

  let photoBase64 = '';
  const photoImg = document.querySelector('#photoPreview img');
  if (photoImg) photoBase64 = photoImg.src;

  try {
    await updateDoc(doc(db, "patients", id), {
      name, age, bloodGroup: blood,
      allergies: document.getElementById('allergies').value.trim(),
      diseases: document.getElementById('diseases').value.trim(),
      medications: document.getElementById('meds').value.trim(),
      emergencyName: ename, emergencyPhone: phone,
      emergencyName2: ename2 || '', emergencyPhone2: ephone2 || '',
      photo: photoBase64,
      updatedAt: new Date()
    });
    document.getElementById('updateStatus').innerText = '✅ Updated Successfully! Your QR code still works!';
    btn.innerHTML = '✅ Updated!';
  } catch (error) {
    document.getElementById('updateStatus').innerText = '❌ Error updating. Please try again.';
    btn.disabled = false;
    btn.innerHTML = '<span class="bi">⬡</span> Update MediPass';
  }
};
</script>

<script>
const cv=document.getElementById('bg'),c=cv.getContext('2d');
let W,H;
const resize=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight};
resize();addEventListener('resize',resize);
const pts=Array.from({length:70},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.8+.4,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,a:Math.random()*.5+.1}));
function draw(){
  c.clearRect(0,0,W,H);
  const g=c.createRadialGradient(W*.3,H*.2,0,W*.5,H*.5,W*.9);
  g.addColorStop(0,'rgba(0,30,80,.95)');g.addColorStop(.5,'rgba(2,8,30,.98)');g.addColorStop(1,'rgba(1,4,16,1)');
  c.fillStyle=g;c.fillRect(0,0,W,H);
  for(const p of pts){p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;}
  for(let i=0;i<pts.length;i++){for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.hypot(dx,dy);if(d<120){c.beginPath();c.moveTo(pts[i].x,pts[i].y);c.lineTo(pts[j].x,pts[j].y);c.strokeStyle=`rgba(0,180,255,${.08*(1-d/120)})`;c.lineWidth=.5;c.stroke();}}c.beginPath();c.arc(pts[i].x,pts[i].y,pts[i].r,0,Math.PI*2);c.fillStyle=`rgba(0,255,231,${pts[i].a*.6})`;c.fill();}
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
